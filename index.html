<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Form</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; padding: 40px 20px; }
        .form-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        .form-container h2 { margin-top: 0; color: #333; text-align: center;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; color: #555; font-weight: bold;}
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        /* Honeypot field hidden from humans */
        .visually-hidden { position: absolute; left: -10000px; top: auto; width: 1px; height: 1px; overflow: hidden; }

        button { width: 100%; padding: 12px; background: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; transition: background 0.3s;}
        button:hover { background: #004494; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2>Job Application</h2>
    <form id="jobForm">
        
        <div class="visually-hidden" aria-hidden="true">
            <label for="botCatch">If you are human, leave this blank.</label>
            <input type="text" id="botCatch" name="botCatch" tabindex="-1">
        </div>

        <div class="form-group">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" required>
        </div>
        <div class="form-group">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" required>
        </div>
        <div class="form-group">
            <label for="mobileNumber">Mobile Number</label>
            <input type="tel" id="mobileNumber" pattern="[0-9]{10,15}" title="Please enter a valid phone number" required>
        </div>
        <div class="form-group">
            <label for="emailAddress">Email Address</label>
            <input type="email" id="emailAddress" required>
        </div>
        <div class="form-group">
            <label for="resume">Upload Resume (PDF or DOC only)</label>
            <input type="file" id="resume" accept=".pdf,.doc,.docx" required>
        </div>
        <button type="submit" id="submitBtn">Submit Application</button>
        <div id="message"></div>
    </form>
</div>

<script>
    const form = document.getElementById('jobForm');
    const messageDiv = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');

    // 🔴 Paste your Web App URL here
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzw0gEYpLd4L5EVqqtMPR9JUhPWb7zk_X8Uqv2BRZOS9aBOUCQ87RIDP9Xfy9ndWN8G3w/exec';

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // UI loading state
        submitBtn.disabled = true;
        submitBtn.innerText = 'Encrypting & Uploading...';
        messageDiv.innerText = '';

        const fileInput = document.getElementById('resume');
        const file = fileInput.files[0];

        // Frontend Security: Limit file size to 5MB to prevent abuse
        if (file && file.size > 5 * 1024 * 1024) {
            messageDiv.innerText = 'File is too large. Maximum size is 5MB.';
            messageDiv.style.color = 'red';
            submitBtn.disabled = false;
            submitBtn.innerText = 'Submit Application';
            return;
        }

        if (file) {
            const reader = new FileReader();
            reader.onload = async function() {
                const base64Data = reader.result.split(',')[1];
                
                const payload = {
                    firstName: document.getElementById('firstName').value,
                    lastName: document.getElementById('lastName').value,
                    mobileNumber: document.getElementById('mobileNumber').value,
                    emailAddress: document.getElementById('emailAddress').value,
                    botCatch: document.getElementById('botCatch').value, // Send honeypot data
                    fileName: file.name,
                    mimeType: file.type,
                    fileBase64: base64Data
                };

                try {
                    const response = await fetch(SCRIPT_URL, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    const result = await response.json();

                    if(result.status === "success") {
                        messageDiv.innerText = 'Application submitted securely!';
                        messageDiv.style.color = 'green';
                        form.reset();
                    } else {
                        throw new Error(result.message);
                    }
                } catch (error) {
                    messageDiv.innerText = 'Security check failed or network error.';
                    messageDiv.style.color = 'red';
                } finally {
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Application';
                }
            };
            reader.readAsDataURL(file);
        }
    });
</script>
</body>
</html>
